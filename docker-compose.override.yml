services:
  postgres:
    container_name: mirea-postgres
    image: "postgres:13-alpine"
    shm_size: 4gb
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./storage/postgres:/var/lib/postgresql/data
    expose:
      - "${POSTGRES_PORT}"
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: always
  web:
    container_name: mirea-web
    build:
      context: .
      dockerfile: cmd/web/web.Dockerfile
    depends_on:
      - postgres
    volumes:
      - ./.env:/app/.env
      - ./storage/proxy.txt:/app/storage/proxy.txt
    restart: always
    ports:
      - "8091:8888"
    expose:
      - "8888"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - default

  frontend:
    container_name: mirea-frontend
    build:
      context: .
      dockerfile: frontend/frontend.Dockerfile
    expose:
      - "80"
    ports:
      - "8092:80"
    networks:
      - default
    restart: always


  redis:
    container_name: mirea-redis
    image: redis:latest
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    expose:
      - "${REDIS_PORT}"
#    ports:
#      - "${REDIS_FORWARD_PORT}:${REDIS_PORT}"
    volumes:
      - ./storage/redis:/data
    command: >
      sh -c '
        mkdir -p /usr/local/etc/redis &&
        echo "requirepass $REDIS_PASSWORD" >> /usr/local/etc/redis/redis.conf &&
        echo "appendonly yes" >> /usr/local/etc/redis/redis.conf &&
        echo "appendfsync everysec" >> /usr/local/etc/redis/redis.conf &&
        redis-server /usr/local/etc/redis/redis.conf
      '
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$REDIS_PASSWORD", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    tty: true
    stdin_open: true


networks:
  default:
    driver: bridge
